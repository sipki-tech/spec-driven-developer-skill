name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint pipeline.sh
        run: shellcheck -s sh skills/spec-driven-dev/scripts/pipeline.sh

  integration:
    name: Integration (${{ matrix.shell }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        shell: [bash, dash, zsh]
        exclude:
          - os: macos-latest
            shell: dash
    steps:
      - uses: actions/checkout@v4

      - name: Install shell (if needed)
        if: matrix.shell == 'dash' && runner.os == 'Linux'
        run: sudo apt-get install -y dash

      - name: Run integration tests
        shell: ${{ matrix.shell }} {0}
        run: |
          set -e
          P="skills/spec-driven-dev/scripts/pipeline.sh"

          echo "=== Test: help ==="
          sh "$P" help

          echo "=== Test: version ==="
          sh "$P" version

          echo "=== Test: init ==="
          sh "$P" init test-feature

          echo "=== Test: status ==="
          sh "$P" status

          echo "=== Test: artifact ==="
          FDIR=".spec/features/test-feature"
          echo "test explore" > "$FDIR/explore.md"
          sh "$P" artifact

          echo "=== Test: status after artifact ==="
          sh "$P" status

          echo "=== Test: approve ==="
          sh "$P" approve

          echo "=== Test: status after approve ==="
          sh "$P" status

          echo "=== Test: artifact (requirements) ==="
          echo "test requirements" > "$FDIR/requirements.md"
          sh "$P" artifact

          echo "=== Test: approve (requirements) ==="
          sh "$P" approve

          echo "=== Test: artifact (design) ==="
          echo "test design" > "$FDIR/design.md"
          sh "$P" artifact

          echo "=== Test: approve (design) ==="
          sh "$P" approve

          echo "=== Test: artifact (impl) ==="
          echo "test task plan" > "$FDIR/task-plan.md"
          sh "$P" artifact

          echo "=== Test: approve (task-plan) ==="
          sh "$P" approve

          echo "=== Test: artifact (implementation) ==="
          echo "test implementation" > "$FDIR/implementation.md"
          sh "$P" artifact

          echo "=== Test: approve (implementation) ==="
          sh "$P" approve

          echo "=== Test: artifact (review) ==="
          echo "test review" > "$FDIR/review.md"
          sh "$P" artifact

          echo "=== Test: approve (review) ==="
          sh "$P" approve

          echo "=== Test: status (done) ==="
          sh "$P" status

          echo "=== Test: history ==="
          sh "$P" history

          echo "=== Test: path traversal rejected ==="
          sh "$P" init traversal-test
          if sh "$P" artifact "../../../etc/passwd" 2>/dev/null; then
            echo "FAIL: path traversal was not rejected"
            exit 1
          fi
          echo "PASS: path traversal correctly rejected"

          echo "=== Test: nonexistent file rejected ==="
          if sh "$P" artifact "nonexistent-file.md" 2>/dev/null; then
            echo "FAIL: nonexistent file was not rejected"
            exit 1
          fi
          echo "PASS: nonexistent file correctly rejected"

          echo "=== Test: JSON validity ==="
          sh "$P" init json-test
          JDIR=".spec/features/json-test"
          echo "test" > "$JDIR/explore.md"
          sh "$P" artifact
          python3 -c "import json; json.load(open('$JDIR/pipeline.json'))"
          echo "PASS: pipeline.json is valid JSON"

          echo "=== Test: duplicate feature rejected ==="
          if sh "$P" init test-feature 2>/dev/null; then
            echo "FAIL: duplicate feature was not rejected"
            exit 1
          fi
          echo "PASS: duplicate feature correctly rejected"

          echo "=== All tests passed ==="
